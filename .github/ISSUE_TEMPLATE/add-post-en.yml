name: "Add Post (EN)"
description: "Add or update post"
title: "[POST EN]: "
labels: ["post_en"]
body:
  - type: input
    id: id
    attributes:
      label: "id"
      description: "Unique post ID"
      placeholder: "2026-02-11-sabotin"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: "date"
      placeholder: "2026-02-11"
    validations:
      required: true

  - type: dropdown
    id: important
    attributes:
      label: "important"
      options:
        - "false"
        - "true"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: "title"
      placeholder: "Maintenance action: trail cleanup on Sabotin"
    validations:
      required: true

  - type: input
    id: image
    attributes:
      label: "image"
      description: "Image name (brez ./post_imgs/)"
      placeholder: "gravity-team.jpg"
    validations:
      required: true

  - type: input
    id: alt
    attributes:
      label: "alt"
      placeholder: "Sabotin maintenance action"
    validations:
      required: true

  - type: textarea
    id: short
    attributes:
      label: "short"
      placeholder: "Short description"
    validations:
      required: true

  - type: textarea
    id: long
    attributes:
      label: "long"
      placeholder: "Long description"
    validations:
      required: true

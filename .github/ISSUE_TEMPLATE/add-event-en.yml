name: "Add Event (EN)"
description: "Add or update event"
title: "[EVENT EN]: "
labels: ["event_en"]
body:
  - type: input
    id: id
    attributes:
      label: "Event ID"
      placeholder: "lan-party-2026"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: "Title"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: "Date"
      placeholder: "2026-04-12"
    validations:
      required: true

  - type: input
    id: image
    attributes:
      label: "Image path"
      placeholder: "./event_imgs/image.jpg"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
    validations:
      required: false

name: "Add Event (SI)"
description: "Dodaj ali posodobi dogodek"
title: "[EVENT SI]: "
labels: ["event"]
body:
  - type: input
    id: id
    attributes:
      label: "Event ID"
      description: "Mora biti unikaten"
      placeholder: "lan-party-2026"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: "Naslov"
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: "Datum"
      placeholder: "2026-04-12"
    validations:
      required: true

  - type: input
    id: image
    attributes:
      label: "Slika"
      description: "Pot do slike"
      placeholder: "./event_imgs/ime-slike.jpg"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Opis"
    validations:
      required: false
